function openLightbox(src, isVideo) {
  const lb = document.createElement('div');
  lb.id = 'lightbox';
  lb.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:99999;display:flex;align-items:center;justify-content:center;';
  const media = isVideo
    ? '<video src="' + src + '" controls autoplay style="max-width:95vw;max-height:90vh;border-radius:8px;box-shadow:0 0 40px rgba(0,0,0,0.8);" onclick="event.stopPropagation()"></video>'
    : '<img src="' + src + '" style="max-width:95vw;max-height:95vh;border-radius:8px;box-shadow:0 0 40px rgba(0,0,0,0.8);object-fit:contain;cursor:zoom-out;"/>';
  lb.innerHTML = media
    + '<button onclick="document.getElementById(&quot;lightbox&quot;).remove();event.stopPropagation();" style="position:fixed;top:16px;right:20px;background:none;border:none;color:white;font-size:2rem;cursor:pointer;line-height:1;z-index:1;">✕</button>';
  lb.onclick = (e) => { if (e.target === lb) lb.remove(); };
  document.body.appendChild(lb);
}
function removePhoto(i) {
  editingPhotos.splice(i,1);
  document.getElementById('photoPreviews').innerHTML = renderPhotoThumbs(false);
}
function handlePhotos(e) {
  const files = Array.from(e.target.files);
  let loaded = 0;
  const totalSize = Array.from(files).reduce((s,f) => s + f.size, 0);
  if (totalSize > 4 * 1024 * 1024) {
    showToast('⚠ File troppo grandi per il salvataggio locale (max ~4MB totali). Riduci la dimensione dei video.', true);
  }
  files.forEach(f => {
    const reader = new FileReader();
    reader.onload = ev => {
      editingPhotos.push(ev.target.result);
      loaded++;
      if (loaded===files.length) document.getElementById('photoPreviews').innerHTML = renderPhotoThumbs(false);
    };
    reader.readAsDataURL(f);
  });
}

function saveRepair(editId) {
  const clientName = document.getElementById('f_clientName').value.trim();
  const problem    = document.getElementById('f_problem').value.trim();
  const activityTypeVal = document.getElementById('f_activityType').value;
  const internalCodeVal = document.getElementById('f_internalCode').value.trim();
  const interventionTypeVal = document.getElementById('f_interventionType').value;

  // Highlight missing required fields in red
  const highlightError = id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (el.tagName === 'SELECT') {
      el.style.borderColor = 'var(--red)';
    } else {
      el.classList.add('field-error');
    }
  };
  const clearErrors = () => {
    document.querySelectorAll('.field-error').forEach(el => el.classList.remove('field-error'));
    ['f_activityType','f_interventionType','f_status'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.borderColor = '';
    });
  };
  clearErrors();

  let hasErrors = false;
  if (!clientName)          { highlightError('f_clientName'); hasErrors = true; }
  if (!activityTypeVal)     { highlightError('f_activityType'); hasErrors = true; }
  if (!interventionTypeVal) { highlightError('f_interventionType'); hasErrors = true; }
  if (!internalCodeVal && interventionTypeVal === 'Laboratorio') { highlightError('f_internalCode'); hasErrors = true; }
  const firstTech = document.getElementById('f_technicianName');
  if (!firstTech || !firstTech.value.trim()) { highlightError('f_technicianName'); hasErrors = true; }
  if (activityTypeVal === 'Riparazione' && !getFaultTypes().length) { const fc=document.getElementById('faultTypesContainer'); if(fc){fc.style.outline='2px solid var(--red)';fc.style.borderRadius='6px';setTimeout(()=>{fc.style.outline='';},3000);} hasErrors = true; }

  const statusVal = document.getElementById('f_status')?.value;
  const endDateVal = document.getElementById('f_endDate')?.value;
  if (!statusVal) { highlightError('f_status'); hasErrors = true; }
  // Completato e Non riparabile richiedono Data fine
  if ((statusVal === 'done' || statusVal === 'unrepairable') && !endDateVal) { highlightError('f_endDate'); hasErrors = true; }
  // Data fine non ammessa se stato è diverso da Completato e Non riparabile
  if (endDateVal && statusVal !== 'done' && statusVal !== 'unrepairable') { highlightError('f_endDate'); highlightError('f_status'); hasErrors = true; }

  // Validate materials qty
  const matContainer = document.getElementById('materialsContainer');
  if (matContainer) {
    const groups = matContainer.querySelectorAll('[id^="materialGroup_"]');
    groups.forEach((group, i) => {
      const n = i + 1;
      const nameEl = document.getElementById('f_material_' + n);
      const codeEl = document.getElementById('f_matcode_' + n);
      const nameText = nameEl ? nameEl.value.trim() : '';
      const codeText = codeEl ? codeEl.value.trim() : '';
      if (!nameText && !codeText) return;
      const qtyEl = document.getElementById('f_qty_' + n);
      const qtyVal = qtyEl ? parseInt(qtyEl.value) : 0;
      if (isNaN(qtyVal) || qtyVal <= 0) {
        if (qtyEl) qtyEl.classList.add('field-error');
        hasErrors = true;
      }
    });
  }

  if (hasErrors) return;

  let repairs = loadRepairs();
  const existingRepair = editId !== null && editId !== 'null' ? repairs.find(r=>r.id==editId) : null;
  const fv = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };

  const data = {
    clientName,
    technicianName: fv('f_technicianName') || existingRepair?.technicianName || '',
    technicianName2: fv('f_technicianName2') || existingRepair?.technicianName2 || '',
    technicianName3: fv('f_technicianName3') || existingRepair?.technicianName3 || '',
    technicianName4: fv('f_technicianName4') || existingRepair?.technicianName4 || '',
    technicianName5: fv('f_technicianName5') || existingRepair?.technicianName5 || '',
    technicianName6: fv('f_technicianName6') || existingRepair?.technicianName6 || '',
    startDate:   fv('f_startDate') || existingRepair?.startDate || '',
    endDate:     fv('f_endDate'),
    activityType:  fv('f_activityType') || existingRepair?.activityType || '',
    interventionType: fv('f_interventionType') || existingRepair?.interventionType || '',
    posizione:     fv('f_posizione') || existingRepair?.posizione || '',
    localita:      fv('f_localita') || existingRepair?.localita || '',
    nInverter:     fv('f_nInverter') || existingRepair?.nInverter || '',
    nCabina:       fv('f_nCabina') || existingRepair?.nCabina || '',
    referenteImpianto: fv('f_referenteImpianto') || existingRepair?.referenteImpianto || '',
    posizioneGps:     fv('f_posizioneGps') || existingRepair?.posizioneGps || '',
    deviceTypology: fv('f_deviceTypology') || existingRepair?.deviceTypology || '',
    internalCode: fv('f_internalCode') || existingRepair?.internalCode || '',
    errorCodes:   getErrorCodes(),
    description:  fv('f_description') || existingRepair?.description || '',
    brand:        fv('f_brand') || existingRepair?.brand || '',
    model:        fv('f_model') || existingRepair?.model || '',
    serial:       fv('f_serial') || existingRepair?.serial || '',
    problem:      fv('f_problem') || existingRepair?.problem || '',
    status:       fv('f_status') || existingRepair?.status || '',
    materials:    getMaterials(),
    materialsNote: fv('f_materialsNote') || existingRepair?.materialsNote || '',
    guastoCliente: (isAdmin() ? fv('f_guastoCliente') : null) ?? existingRepair?.guastoCliente ?? '',
    tipologieGuasto: getFaultTypes().length ? getFaultTypes() : existingRepair?.tipologieGuasto || [],
    photos:       editingPhotos.filter(p => p.length < 2*1024*1024) // skip files >1.5MB base64 that would break storage
  };

  if (editId !== null && editId !== 'null') {
    const idx = repairs.findIndex(r=>r.id==editId);
    if (idx>=0) repairs[idx] = { ...repairs[idx], ...data, updatedAt: new Date().toISOString() };
  } else {
    const newId = repairs.length ? Math.max(...repairs.map(r=>r.id)) + 1 : 1001;
    repairs.push({ id: newId, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(), ...data });
  }

  // Log the operation
  if (editId !== null && editId !== 'null') {
    const saved = repairs.find(r => r.id == editId);
    addLogEntry('edit', saved, _preEditRepair);
  } else {
    const saved = repairs[repairs.length - 1];
    addLogEntry('insert', saved, null);
  }
  saveRepairs(repairs);
  if (editId !== null && editId !== 'null') releaseLock(editId);
  closeModal();
  showToast(editId !== null ? '✓ Riparazione aggiornata' : '✓ Riparazione creata');
  renderCurrentView();
}

function deleteRepair(id) {
  if (!confirm('Eliminare questa riparazione?')) return;
  const toDelete = loadRepairs().find(r=>r.id==id);
  if (toDelete) addLogEntry('delete', toDelete, null);
  const repairs = loadRepairs().filter(r=>r.id!=id);
  saveRepairs(repairs);
  showToast('Riparazione eliminata');
  updateSideCount();
  renderCurrentView();
}

function importMasterFile(file) {
  if (!isAdmin()) { showToast("Solo l'amministratore può importare le liste", true); return; }
  if (!file) { showToast('Nessun file selezionato', true); return; }
  if (typeof XLSX === 'undefined') { showToast('Libreria Excel non caricata. Verifica la connessione internet.', true); return; }
  showToast('Importazione in corso…');
  const reader = new FileReader();
  reader.onerror = () => showToast('Errore lettura file', true);
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
    // Snapshot current lists before overwriting (for diff analysis)
    const previousLists = {
      clients: loadClients(),
      techs:   loadTechnicians(),
    };
    const sheetMap = {
      'Clienti':   { saveFn: saveClients,      updateFn: updateClientCount,     label: 'clienti' },
      'Tecnici':   { saveFn: saveTechnicians,   updateFn: updateTechCount,       label: 'tecnici' },
      'Errori':    { saveFn: saveErrors,        updateFn: ()=>{},                label: 'codici errore' },
      'Magazzino':     { saveFn: null,    updateFn: ()=>{}, label: 'articoli magazzino' },
      'Marca Modello': { saveFn: null,    updateFn: ()=>{}, label: 'marca/modello' },
      'Tipologia Guasto': { saveFn: saveFaultTypes, updateFn: ()=>{}, label: 'tipologie guasto' },
    };
    const skipHeaders = ['cliente','ragione sociale','tecnico','tipologia','tipo','dispositivo','device','errore','error','codice','code'];
    const results = [];
    let found = 0;
    wb.SheetNames.forEach(name => {
      const mapped = Object.keys(sheetMap).find(k => k.toLowerCase() === name.toLowerCase().trim());
      if (!mapped) return;
      const ws = wb.Sheets[name];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      if (mapped === 'Marca Modello') {
        let brandRows = rows.map(r => String(r[0]||'').trim()).filter(Boolean);
        const unique = [...new Set(brandRows)].sort((a,b)=>a.localeCompare(b));
        saveBrands(unique);
        results.push(unique.length + ' ' + sheetMap[mapped].label);
        found++;
        return;
      }
      if (mapped === 'Magazzino') {
        // Two columns: col A = codice, col B = descrizione
        let warehouseRows = rows.map(r => ({ code: String(r[0]||'').trim(), name: String(r[1]||'').trim() })).filter(r => r.code || r.name);
        saveWarehouse(warehouseRows);
        results.push(warehouseRows.length + ' ' + sheetMap[mapped].label);
        found++;
        return;
      }
      if (mapped === 'Errori') {
        // Read raw rows: col A = codice, col B = descrizione
        const rawRows = XLSX.utils.sheet_to_json(ws, {header:1, defval:'', raw:false});
        let errRows = rawRows.map(r => ({
          code: String(r[0]||'').trim(),
          description: String(r[1]||'').trim()
        })).filter(r => r.code);
        saveErrors(errRows);
        showToast('✓ ' + errRows.length + ' codici errore importati');
        results.push(errRows.length + ' ' + sheetMap[mapped].label);
        found++;
        return;
      }
      let items = rows.map(r => String(r[0]||'').trim()).filter(Boolean);
      const unique = [...new Set(items)].sort((a,b)=>a.localeCompare(b));
      sheetMap[mapped].saveFn(unique);
      sheetMap[mapped].updateFn();
      results.push(unique.length + ' ' + sheetMap[mapped].label);
      found++;
    });
    if (found === 0) {
      showToast('⚠ Nessun foglio riconosciuto. Fogli trovati: ' + wb.SheetNames.join(', ') + '. Usa: Clienti, Tecnici, Errori, Magazzino, Marca Modello, Tipologia Guasto', true);
      return;
    }

    // Analyze differences with existing repairs and propose updates
    analyzeAndProposeLavorazioniUpdate(previousLists);

    renderCurrentView();
    showToast('✓ Importati: ' + results.join(' · '));
    } catch(err) {
      showToast('Errore importazione: ' + (err.message || err), true);
      console.error('Import error:', err);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ── LAVORAZIONI UPDATE AFTER IMPORT ─────────────────────────
function analyzeAndProposeLavorazioniUpdate(previousLists) {
  const repairs = loadRepairs();
  if (!repairs.length) return;

  // Fields to compare: {field in repair, loadFn, label}
  const fieldMap = [
    { field: 'clientName',      prev: previousLists.clients,    curr: loadClients(),      label: 'Clienti' },
    { field: 'technicianName',  prev: previousLists.techs,      curr: loadTechnicians(),  label: 'Tecnici' },
  ];

  const diffs = [];

  fieldMap.forEach(({ field, prev, curr, label }) => {
    if (!prev || !curr) return;
    const prevSet = new Set(prev);
    const currSet = new Set(curr);

    // Find renames: values removed from old list that are not in new list
    prev.forEach(oldVal => {
      if (!currSet.has(oldVal)) {
        // Count repairs using this value
        const affected = repairs.filter(r => {
          if (field === 'technicianName') {
            return [r.technicianName,r.technicianName2,r.technicianName3,r.technicianName4,r.technicianName5,r.technicianName6].includes(oldVal);
          }
          return r[field] === oldVal;
        });
        if (affected.length > 0) {
          // Find possible match in new list (similar name)
          const similar = curr.find(c => c.toLowerCase().includes(oldVal.toLowerCase().substring(0,5)) || oldVal.toLowerCase().includes(c.toLowerCase().substring(0,5)));
          diffs.push({
            type: similar ? 'rename' : 'removed',
            field, label,
            oldVal, newVal: similar || null,
            count: affected.length,
            affectedIds: affected.map(r => r.id)
          });
        }
      }
    });
  });

  if (diffs.length === 0) return;

  showUpdatePreviewModal(diffs);
}

function applyLavorazioniUpdate(diffs) {
  let repairs = loadRepairs();
  let updated = 0;

  diffs.forEach((d, i) => {
    const applyCheck = document.getElementById('diff_apply_' + i);
    if (!applyCheck || !applyCheck.checked) return;

    const newValEl = document.getElementById('diff_newval_' + i);
    const newVal = newValEl ? newValEl.value : '';
    if (!newVal && d.type === 'rename') return; // skip if no new value chosen

    repairs = repairs.map(r => {
      let changed = false;
      if (d.field === 'technicianName') {
        ['technicianName','technicianName2','technicianName3','technicianName4','technicianName5','technicianName6'].forEach(k => {
          if (r[k] === d.oldVal) {
            if (newVal) r = { ...r, [k]: newVal };
            changed = true;
          }
        });
      } else {
        if (r[d.field] === d.oldVal) {
          if (newVal) r = { ...r, [d.field]: newVal };
          changed = true;
        }
      }
      if (changed) updated++;
      return r;
    });
  });

  saveRepairs(repairs);
  document.getElementById('updatePreviewOverlay').remove();
  showToast('✓ ' + updated + ' attività aggiornate');
  renderCurrentView();
}

function fillTemplate(templateHtml, r) {
  const tecnici = [r.technicianName,r.technicianName2,r.technicianName3,r.technicianName4,r.technicianName5,r.technicianName6].filter(Boolean).join(', ');
  const materiali = (r.materials||[]).map(m => typeof m==='object' ? (m.code?'['+m.code+'] ':'')+m.name : m).join('\n');
  const quantita = (r.materials||[]).map(m => typeof m==='object' ? (m.qty||'') : '').join('\n');
  const map = {
    '{{codiceInterno}}':        r.internalCode||'',
    '{{cliente}}':              r.clientName||'',
    '{{tipologiaAttivita}}':    r.activityType||'',
    '{{luogoModalita}}':        r.interventionType||'',
    '{{dataInizio}}':           formatDate(r.startDate),
    '{{dataFine}}':             formatDate(r.endDate),
    '{{tecnici}}':              tecnici,
    '{{tipologiaDispositivo}}': r.deviceTypology||'',
    '{{marcaModello}}':         r.brand||'',
    '{{seriale}}':              r.serial||'',
    '{{denominazioneImpianto}}':r.posizione||'',
    '{{localita}}':             r.localita||'',
    '{{nInverter}}':            r.nInverter||'',
    '{{nCabina}}':              r.nCabina||'',
    '{{referenteImpianto}}':    r.referenteImpianto||'',
    '{{descrizioneGuasto}}':    r.description||'',
    '{{noteLavorazione}}':      r.problem||'',
    '{{codiciErrore}}':         (r.errorCodes||[]).join(', '),
    '{{codiciErroreTxt}}':      (r.errorCodes||[]).join(', '),
    '{{stato}}':                (STATUSES[r.status]?.label||r.status||''),
    '{{materiali}}':            materiali,
    '{{quantita}}':             quantita,
    '{{annotazioneMateriali}}': r.materialsNote||'',
  };
  let out = templateHtml;
  Object.entries(map).forEach(([k,v]) => { out = out.split(k).join(v); });
  return out;
}

function tmplFormat(cmd) { document.execCommand(cmd, false, null); document.getElementById('tmplEditor').focus(); }
function tmplFontSize(v) { if(v) document.execCommand('fontSize', false, v); document.getElementById('tmplEditor').focus(); }
function tmplAlign(cmd) { if(cmd) document.execCommand(cmd, false, null); document.getElementById('tmplEditor').focus(); }

function insertPlaceholder(key) {
  const editor = document.getElementById('tmplEditor');
  if (!editor) return;
  editor.focus();
  const sel = window.getSelection();
  const badge = `<span style="background:rgba(241,187,56,0.15);color:var(--accent);border:1px solid rgba(241,187,56,0.3);border-radius:4px;padding:1px 5px;font-size:0.78rem;font-family:var(--font-mono);">${key}</span>`;
  if (sel && sel.rangeCount) {
    const range = sel.getRangeAt(0);
    range.deleteContents();
    const el = document.createElement('span');
    el.innerHTML = badge;
    const frag = document.createDocumentFragment();
    let node;
    while ((node = el.firstChild)) frag.appendChild(node);
    range.insertNode(frag);
    range.collapse(false);
    sel.removeAllRanges();
    sel.addRange(range);
  } else {
    editor.innerHTML += badge;
  }
}

function saveTemplateFromEditor() {
  const editor = document.getElementById('tmplEditor');
  if (!editor) return;
  saveTemplate({ content: editor.innerHTML });
  showToast('✓ Template salvato');
}

function previewTemplate() {
  const editor = document.getElementById('tmplEditor');
  if (!editor) return;
  const repairs = loadRepairs();
  if (!repairs.length) { showToast('Nessuna attività trovata', true); return; }
  const r = repairs[repairs.length - 1];
  const filled = fillTemplate(editor.innerHTML, r);
  const win = window.open('', '_blank', 'width=800,height=700');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Anteprima Report</title>
    <style>body{font-family:Arial,sans-serif;padding:40px;max-width:800px;margin:0 auto;color:#111;line-height:1.6;}
    hr{border:none;border-top:1px solid #ccc;margin:16px 0;}</style></head>
    <body>${filled}</body></html>`);
  win.document.close();
}

function uploadWordTemplate(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const bytes = new Uint8Array(e.target.result);
      // Convert to base64 in chunks to avoid stack overflow on large files
      let binary = '';
      const chunkSize = 8192;
      for (let i = 0; i < bytes.length; i += chunkSize) {
        binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
      }
      const base64 = btoa(binary);
      try {
        saveWordTemplate(base64);
        showToast('✓ Template Word caricato (' + (bytes.length / 1024).toFixed(0) + ' KB)');
      } catch(e) {
        showToast('File troppo grande per localStorage (max ~3MB). Usa un template più piccolo.', true);
        return;
      }
      renderTemplateEditor();
    } catch(e) {
      showToast('Errore nel caricamento del file: ' + e.message, true);
    }
  };
  reader.readAsArrayBuffer(file);
}

async function generateReportWord(r) {
  const base64 = loadWordTemplate();
  if (!base64) { showToast('Nessun template Word caricato. Vai su Template Report.', true); return; }
  if (typeof PizZip === 'undefined' || typeof window.docxtemplater === 'undefined') {
    showToast('Librerie non ancora caricate, riprova tra un secondo', true); return;
  }

  showToast('Generazione documento in corso...');

  try {
    // Step 1: compile template with docxtemplater
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const zip = new PizZip(bytes);

    // Fix Word XML split tags around [[ ]] placeholders
    const wordDoc = zip.files['word/document.xml'];
    if (wordDoc) {
      let xml = wordDoc.asText();
      xml = xml.replace(/\[\[<\/w:t>([\s\S]*?)<w:t(?:[^>]*)>([^\]]*?)\]\]/g, (m,_,end) => '[['+end+']]');
      xml = xml.replace(/\[\[([^<>\[\]]*)<[^>]+>([^<>\[\]]*)\]\]/g, '[[$1$2]]');
      zip.file('word/document.xml', xml);
    }

    const doc = new window.docxtemplater(zip, {
      paragraphLoop: true, linebreaks: true,
      nullGetter: () => '',
      delimiters: { start: '[[', end: ']]' },
      parser: (tag) => ({
        get(scope) {
          // Support JS expressions: ==, !=, ||, &&, !
          try {
            const fn = new Function('scope', 'with(scope){return (' + tag + ')}');
            return fn(scope);
          } catch(e) {
            return scope[tag] !== undefined ? scope[tag] : '';
          }
        }
      }),
    });

    const tecnici = [r.technicianName,r.technicianName2,r.technicianName3,r.technicianName4,r.technicianName5,r.technicianName6].filter(Boolean).join(', ');
    const materiali = (r.materials||[]).map((m,i) => typeof m==='object'
      ? { codice: m.code||'', nome: m.name||'', qty: String(m.qty||''), n: String(i+1) }
      : { codice: '', nome: String(m), qty: '', n: String(i+1) });
    const materialiTxt = materiali.map(m => (m.codice?'['+m.codice+'] ':'')+m.nome+(m.qty?' x '+m.qty:'')).join(', ');
    const quantita = materiali.map(m => m.qty).join(', ');
    doc.render({
      codiceInterno: r.internalCode||'', cliente: r.clientName||'',
      tipologiaAttivita: r.activityType||'', luogoModalita: r.interventionType||'',
      dataInizio: formatDate(r.startDate), dataFine: formatDate(r.endDate),
      tecnici, marcaModello: r.brand||'', seriale: r.serial||'',
      denominazioneImpianto: r.posizione||'', localita: r.localita||'',
      nInverter: r.nInverter||'', nCabina: r.nCabina||'',
      referenteImpianto: r.referenteImpianto||'', posizioneGps: r.posizioneGps||'',
      descrizioneGuasto: r.description||'', noteLavorazione: r.problem||'',
      codiciErrore: (r.errorCodes||[]).map((c,i) => { const err = loadErrors().find(e=>(typeof e==='object'?e.code:e)===c); return { codice: c, descrizione: err&&typeof err==='object'?err.description||'':'', n: String(i+1) }; }),
      codiciErroreTxt: (r.errorCodes||[]).join(', '), stato: STATUSES[r.status]?.label||r.status||'',
      // Conditional variables for template sections
      isImpianto:    r.interventionType === 'Impianto',
      isRemoto:      r.interventionType === 'Remoto',
      isLaboratorio: r.interventionType === 'Laboratorio',
      isImpiantoORemoto: r.interventionType === 'Impianto' || r.interventionType === 'Remoto',
      isCompletato:  r.status === 'done',
      isDaLavorare:  r.status === 'todo',
      isInAttesa:    r.status === 'waiting',
      isInLavorazione: r.status === 'progress',
      hasMateriali:  (r.materials||[]).length > 0,
      hasCodiciErrore: (r.errorCodes||[]).length > 0,
      hasCodiceInterno: !!(r.internalCode),
      hasTipologieGuasto: (r.tipologieGuasto||[]).length > 0,
      hasNote:       !!(r.problem),
      hasDescrizione: !!(r.description),
      hasInfoCliente: !!(r.guastoCliente),
      materiali, materialiTxt, quantita, annotazioneMateriali: r.materialsNote||'',
      informazioniCliente: r.guastoCliente||'',
      tipologieGuasto: (r.tipologieGuasto||[]).join(', '),
    });

    // Step 2: add read-only protection to the compiled docx
    const filledZip = doc.getZip();

    // Generate password-based protection hash (Word SHA512 format)
    const password = loadDocPassword();
    const salt = new Uint8Array([0xFE,0xF1,0x19,0xF9,0xA9,0xC0,0xB9,0xB1,0x12,0x34,0x56,0x78,0x9A,0xBC,0xDE,0xF0]);
    const saltB64 = btoa(String.fromCharCode(...salt));
    const encoder = new TextEncoder();
    let hashInput = new Uint8Array([...salt, ...encoder.encode(password)]);
    let hashBuf = await crypto.subtle.digest('SHA-512', hashInput);
    for (let i = 0; i < 99999; i++) {
      const iter = new Uint8Array(4);
      new DataView(iter.buffer).setUint32(0, i, true);
      hashInput = new Uint8Array([...new Uint8Array(hashBuf), ...iter]);
      hashBuf = await crypto.subtle.digest('SHA-512', hashInput);
    }
    const hashB64 = btoa(String.fromCharCode(...new Uint8Array(hashBuf)));

    const protection = `<w:documentProtection w:edit="readOnly" w:enforcement="1" w:cryptProviderType="rsaAES" w:cryptAlgorithmClass="hash" w:cryptAlgorithmType="typeAny" w:cryptAlgorithmSid="14" w:cryptSpinCount="100000" w:hash="${hashB64}" w:salt="${saltB64}"/>`;

    // Add protection to settings.xml
    const settingsFile = filledZip.files['word/settings.xml'];
    if (settingsFile) {
      let settingsXml = settingsFile.asText();
      if (settingsXml.includes('w:documentProtection')) {
        settingsXml = settingsXml.replace(/<w:documentProtection[^/]*\/>/g, protection);
      } else {
        settingsXml = settingsXml.replace('</w:settings>', protection + '</w:settings>');
      }
      filledZip.file('word/settings.xml', settingsXml);
    } else {
      const settingsXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
        '<w:settings xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">' +
        protection + '</w:settings>';
      filledZip.file('word/settings.xml', settingsXml);
    }

    // Step 3: download the protected .docx
    const out = filledZip.generate({
      type: 'blob',
      mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
    });
    const url = URL.createObjectURL(out);
    const a = document.createElement('a');
    a.href = url;
    // Build filename
    let filename;
    const parts = (r.startDate||'').split('-'); // yyyy-mm-dd
    const ddmmyy = parts.length === 3 ? (parts[2]||'') + (parts[1]||'') + (parts[0]||'').slice(-2) : '';
    if (r.interventionType === 'Laboratorio' && r.internalCode) {
      filename = 'RPT_' + r.internalCode + (ddmmyy ? '_' + ddmmyy : '');
    } else if ((r.interventionType === 'Impianto' || r.interventionType === 'Remoto') && r.localita) {
      // Remove province "(MI)" suffix and sanitize for filename
      const localita = r.localita
        .replace(/\s*\([^)]*\)\s*$/, '')  // remove (XX) suffix
        .trim()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // remove accents
        .replace(/[^a-zA-Z0-9]/g, '_')    // replace non-alphanumeric with _
        .replace(/_+/g, '_')              // collapse multiple underscores
        .replace(/^_|_$/g, '');           // trim leading/trailing underscores
      filename = 'RPT_' + localita + (ddmmyy ? '_' + ddmmyy : '');
    } else {
      filename = (r.internalCode || r.id) + '_RPT';
    }
    a.download = filename + '.docx';
    a.click();
    URL.revokeObjectURL(url);
    showToast('\u2713 Documento scaricato (sola lettura)');

  } catch(e) {
    console.error('Error:', e);
    let msg = e.message || 'Errore sconosciuto';
    if (e.properties && e.properties.errors) {
      msg = e.properties.errors.map(err => err.properties?.explanation || err.message || JSON.stringify(err)).join(' | ');
    }
    showToast('Errore: ' + msg, true);
  }
}

function exportByStatus() {
  const repairs = loadRepairs();

  Object.entries(STATUSES).forEach(([key, st]) => {
    const filtered = repairs.filter(r=>r.status===key).map(r=>({
      'ID': r.id, 'Cliente': r.clientName, 'Codice Interno': r.internalCode||'', 'Dispositivo': `${r.brand} ${r.model}`,
      'Problema': r.problem, 'Tecnico': r.technicianName,
      'Data inizio': r.startDate, 'Data Fine': r.endDate

        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;">
          <div style="font-size:22px;font-weight:700;color:${c};">${n}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px;">${l}</div>
        </div>`).join('')}
    </div>
    <div class="toolbar" style="margin-bottom:12px;">
      <select class="filter-select" id="logOpFilter">
        <option value="all">Tutti gli operatori</option>
        ${operators.map(o=>`<option value="${esc(o)}">${esc(o)}</option>`).join('')}
      </select>
      <select class="filter-select" id="logTypeFilter">
        <option value="all">Tutte le operazioni</option>
        <option value="insert">Inserimento</option>
        <option value="edit">Modifica</option>
        <option value="delete">Cancellazione</option>
      </select>
      <input type="date" id="logDateFrom" class="form-input" style="width:140px;" placeholder="DA"/>
      <input type="date" id="logDateTo" class="form-input" style="width:140px;" placeholder="A" value="${new Date().toISOString().split('T')[0]}"/>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Data / Ora</th><th>Operatore</th><th>Operazione</th><th>Codice</th><th>Dettaglio</th>
        </tr></thead>
        <tbody id="logTbody">${renderRows(log)}</tbody>
      </table>
    </div>`;

  const applyFilters = () => {
    const op   = document.getElementById('logOpFilter')?.value || 'all';
    const type = document.getElementById('logTypeFilter')?.value || 'all';
    const from = document.getElementById('logDateFrom')?.value || '';
    const to   = document.getElementById('logDateTo')?.value || '';
    let filtered = loadLog().slice().reverse();
    if (op   !== 'all') filtered = filtered.filter(e => e.operator === op);
    if (type !== 'all') filtered = filtered.filter(e => e.type === type);
    if (from) filtered = filtered.filter(e => e.ts.slice(0,10) >= from);
    if (to)   filtered = filtered.filter(e => e.ts.slice(0,10) <= to);
    const tbody = document.getElementById('logTbody');
    if (tbody) tbody.innerHTML = renderRows(filtered);
  };

  requestAnimationFrame(() => {
    ['logOpFilter','logTypeFilter','logDateFrom','logDateTo'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.addEventListener('change', applyFilters);
    });
  });
}

// ============================================================
// HELPERS
// ============================================================
function today() {
  return new Date().toISOString().split('T')[0];
}
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function clearFieldError(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.remove('field-error');
  el.style.borderColor = '';
}

function showAlert(msg) {
  const existing = document.getElementById('alertOverlay');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.className = 'alert-overlay';
  div.id = 'alertOverlay';
  div.innerHTML = '<div class="alert-box">'
    + '<div class="alert-icon">⚠️</div>'
    + '<div class="alert-msg" style="text-align:left;">' + msg + '</div>'
    + '<button class="alert-btn" onclick="document.getElementById(\'alertOverlay\').remove()">OK</button>'
    + '</div>';
  document.body.appendChild(div);
}

function showToast(msg, error=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (error?' error':'') + ' show';
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 3000);
}

// BOOT
// ============================================================
function bootApp() {
  const role = getCurrentRole();
  // Update role badge in header
  const badge = document.getElementById('roleBadgeHeader');
  if (badge) {
    badge.innerHTML = role === 'admin'
      ? '<span class="role-badge role-admin">🔐 Amministratore</span>'
      : `<span class="role-badge role-operator">👷 Operatore: ${esc(getOperatorName())}</span>`;
  }
  // Show/hide admin-only nav items
  const clientsNav = document.getElementById('nav-clients');
  if (clientsNav) clientsNav.style.display = isAdmin() ? 'flex' : 'none';
  const techsNav = document.getElementById('nav-technicians');
  if (techsNav) techsNav.style.display = isAdmin() ? 'flex' : 'none';
  const miNav = document.getElementById('nav-masterimport');
  if (miNav) miNav.style.display = isAdmin() ? 'flex' : 'none';
  const tmplNav = document.getElementById('nav-template');
  if (tmplNav) tmplNav.style.display = isAdmin() ? 'flex' : 'none';
  const reportsNav = document.getElementById('nav-reports');
  if (reportsNav) reportsNav.style.display = isAdmin() ? 'flex' : 'none';
  const logNav = document.getElementById('nav-activitylog');
  if (logNav) logNav.style.display = isAdmin() ? 'flex' : 'none';
  const btnConf = document.getElementById('btnConfigurazione');
  if (btnConf) btnConf.style.display = isAdmin() ? '' : 'none';
  updateSidebarLogo();

  updateSideCount();
  updateClientCount();
  updateTechCount();
  renderDashboard();
  // Warn if warehouse not loaded (large files can't be stored in localStorage)
  if (loadWarehouse().length === 0 && isAdmin()) {
    setTimeout(() => showToast('⚠ Magazzino non caricato. Vai su Importa Liste per caricare il file Excel.', true), 1000);
  }
  if (hasPendingSync()) {
    setTimeout(() => showToast('⚠ Ci sono modifiche locali non sincronizzate — connettiti a OneDrive', true), 1500);
  }
  // initMsal removed — using native OAuth2 PKCE
}

// Check existing session or show login
if (getCurrentRole()) {
  bootApp();
} else {
  showLoginScreen();
}
